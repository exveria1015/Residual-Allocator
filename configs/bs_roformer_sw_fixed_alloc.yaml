  dim_head: 64
  heads: 8
  attn_dropout: 0.1
  ff_dropout: 0.1
  flash_attn: true
  dim_freqs_in: 1025
  stft_n_fft: 2048
  stft_hop_length: 512
  stft_win_length: 2048
  stft_normalized: false
  mask_estimator_depth: 2
  multi_stft_resolution_loss_weight: 1.0
  multi_stft_resolutions_window_sizes: !!python/tuple
    - 4096
    - 2048
    - 1024
    - 512
    - 256
  multi_stft_hop_size: 147
  multi_stft_normalized: false
  mlp_expansion_factor: 4
  use_torch_checkpoint: false
  skip_connection: false

training:
  dataset_type: 6
  batch_size: 2
  gradient_accumulation_steps: 1
  grad_clip: 0
  valid_metrics:
    - sdr
    - si_sdr
    - bleedless
    - fullness
  metric_for_scheduler: sdr
  use_active_stem_avg_for_scheduler: true
  valid_log_to_file: true
  valid_console_summary_only: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  audio_file_cache_size: 64
  device_prefetch: false
  log_every_steps: 20
  track_trainable_drift: false
  enable_mix_reconstruction_validation: true
  mix_reconstruction_valid_path: ../wavs
  mix_reconstruction_extensions:
    - wav
    - flac
  mix_reconstruction_stems:
    - vocals
    - bass
    - drums
    - other
    - guitar
    - piano
  mix_reconstruction_metric_name: sum_vs_mix_sdr
  instruments:
    - bass
    - drums
    - other
    - vocals
    - guitar
    - piano
  patience: 3
  reduce_factor: 0.95
  target_instrument: null
  num_epochs: 1000
  num_steps: 1000
  save_every_steps: 100
  augmentation: false
  augmentation_type: simple1
  use_mp3_compress: false
  augmentation_mix: true
  augmentation_loudness: true
  augmentation_loudness_type: 1
  augmentation_loudness_min: 0.5
  augmentation_loudness_max: 1.5
  q: 0.95
  coarse_loss_clip: true
  ema_momentum: 0.999
  optimizer: adam
  scheduler: none
  lr: 1.0e-6
  other_fix: false
  use_amp: true


inference:
  batch_size: 1
  dim_t: 1101
  num_overlap: 2
  normalize: false
  allocator_chunk_size: 882000
  stem_chunk_sizes:
    bass: 882000
    other: 882000
