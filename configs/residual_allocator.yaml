# Residual Allocator inference configuration.
# Keep this file next to weights/residual_allocator.safetensors.
allocator:
  router_type: time_screening
  hidden_channels: 48
  kernel_size: 7
  screening_num_bands: 32
  screening_num_frames: 192
  screening_eval_num_bands: 24
  screening_eval_num_frames: 128
  screening_token_dim: 192
  screening_heads: 6
  screening_dim_head: 16
  screening_dropout: 0.0
  screening_norm_values: false
  screening_tanh_norm: true
  screening_init_window: 96.0
  screening_init_relevance_width: 4.0
  screening_init_scale: 0.2
  screening_init_mode: paper
  screening_random_std: 0.02
  use_small_delta_branch: true
  delta_branch_hidden_channels: 48
  delta_branch_freq_kernel_size: 5
  delta_branch_time_kernel_size: 5
  delta_branch_scale: 0.06
  base_weight_gamma: 2.0
  blend_init_bias: -1.0
  blend_floor: 0.05
  delta_scale: 4.0
  residual_scale_init: 1.0
  residual_scale_min: 1.0
  residual_scale_max: 1.0
  learn_residual_scale: false
  use_exact_mix_closure: true
  exact_mix_closure_topk: 2
  inactive_conf_scale: 0.0
  inactive_keep_floor: 0.0
  inactive_keep_max: 0.05
  use_artifact_detector: true
  artifact_hidden_channels: 32
  artifact_kernel_size: 3
  artifact_init_bias: -6.0
  artifact_max_suppression: 0.5
  artifact_keep_floor: 0.0
  artifact_base_active_mix_ratio: 0.02
  artifact_gt_inactive_mix_ratio: 0.006
  artifact_gt_active_mix_ratio: 0.02
  artifact_over_gt_margin_db: 12.0
